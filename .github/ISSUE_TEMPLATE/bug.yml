name: Bug report
description: Report a reproducible Deep Shadow problem
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include passwords, recordings, or other private information. This report is public.
  - type: input
    id: chrome
    attributes:
      label: Chrome version
      placeholder: "For example: 142.0.7444.176"
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: Operating system
      placeholder: "For example: macOS 15.5"
    validations:
      required: true
  - type: input
    id: video
    attributes:
      label: Public video URL
      description: Omit this if the URL is private or sensitive.
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
